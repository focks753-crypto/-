<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OG 일정">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>오렌지골프존아카데미</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg0:#0d0d0d;--bg1:#1a1a1a;--bg2:#252525;--bg3:#303030;
  --border:#2e2e2e;--border2:#3d3d3d;
  --t1:#fff;--t2:#ccc;--t3:#888;--t4:#555;
}
html,body{height:100%;background:var(--bg0);color:var(--t1);}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
.hdr{display:flex;align-items:center;gap:10px;padding:10px 16px;padding-top:calc(10px + env(safe-area-inset-top));background:var(--bg0);border-bottom:1px solid var(--border);flex-shrink:0;}
.hdr-logo{width:34px;height:34px;object-fit:contain;flex-shrink:0;}
.hdr-title{font-size:15px;font-weight:700;color:#fff;flex:1;}
.login-chip{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.login-chip.logged{color:#000;border-color:transparent;}

/* TOP TABS */
.top-tabs{display:flex;gap:7px;padding:10px 14px;background:var(--bg0);border-bottom:1px solid var(--border);flex-shrink:0;}
.ttab{flex:1;padding:9px 6px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:var(--bg2);color:var(--t3);transition:all .15s;}
.ttab.active{background:#fff;color:#000;}

/* PAGES */
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;background:var(--bg0);}
.page.show{display:block;}
.inner{padding:14px 16px 80px;}

/* DAY SELECTOR */
.day-sel{background:var(--bg0);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;}
.week-info .wm{font-size:14px;font-weight:700;color:var(--t1);}
.week-info .ws{font-size:11px;color:var(--t3);margin-top:2px;}
.week-btns{display:flex;gap:5px;}
.wbtn{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--t2);font-size:13px;padding:6px 13px;cursor:pointer;}
.tbtn{background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--t3);font-size:12px;padding:6px 11px;cursor:pointer;}
.day-tabs{display:flex;gap:4px;padding:0 12px 10px;overflow-x:auto;scrollbar-width:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.dtab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 10px;border-radius:12px;cursor:pointer;min-width:44px;background:var(--bg2);border:1px solid transparent;}
.dtab .dw{font-size:10px;color:var(--t4);font-weight:600;}
.dtab .dd{font-size:18px;font-weight:700;color:var(--t3);}
.dtab.today{border-color:var(--border2);}
.dtab.today .dd{color:var(--t1);}
.dtab.sel{background:#fff;border-color:transparent;}
.dtab.sel .dw{color:#666;}
.dtab.sel .dd{color:#000;}

/* TIME LIST */
.time-list{padding:0 16px 80px;}
.trow{display:flex;align-items:stretch;border-bottom:1px solid #1e1e1e;min-height:54px;}
.trow.hr{border-bottom:1px solid #282828;}
.tcol{width:56px;flex-shrink:0;display:flex;align-items:flex-start;justify-content:flex-end;padding:9px 10px 0 0;border-right:1px solid var(--border);background:var(--bg1);}
.tlbl{font-size:12px;font-weight:700;color:var(--t2);}
.tlbl.h{font-size:11px;font-weight:400;color:var(--t4);}
.scol{flex:1;padding:5px 10px;display:flex;flex-direction:column;gap:5px;min-width:0;}
.slot{border-radius:10px;padding:9px 11px;display:flex;align-items:center;gap:8px;}
.slot-info{flex:1;min-width:0;}
.slot-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slot-sub{font-size:11px;opacity:.7;margin-top:1px;}
.type-badge{flex-shrink:0;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;background:rgba(0,0,0,.3);}
.del-x{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.25);border:none;color:inherit;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.6;}
.del-x:active{opacity:1;background:rgba(180,30,30,.5);}
.add-btn{width:100%;background:var(--bg2);border:none;border-radius:9px;color:var(--t3);font-size:12px;padding:8px;cursor:pointer;font-family:inherit;}
.add-btn:active{background:var(--bg3);color:var(--t2);}

/* FAB */
.fab{position:fixed;right:18px;bottom:calc(16px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:50%;background:#fff;color:#000;font-size:28px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.7);}
.fab:active{transform:scale(.92);}

/* STAFF */
.sec{font-size:11px;color:var(--t4);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;margin-top:20px;}
.sec:first-child{margin-top:0;}
.sform{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:10px;}
.sform input,.sform select{width:100%;padding:12px 14px;border:1px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:15px;}
.sform input::placeholder{color:var(--t4);}
.sform .row2{display:flex;gap:8px;}
.sform .row2 input,.sform .row2 select{flex:1;}
.sform button{width:100%;padding:13px;border-radius:10px;border:none;background:#fff;color:#000;font-size:15px;font-weight:700;cursor:pointer;}
.staff-card{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:13px;margin-bottom:8px;}
.av{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;}
.sc-info{flex:1;min-width:0;}
.sc-name{font-size:15px;font-weight:600;color:var(--t1);}
.sc-role{font-size:12px;color:var(--t3);margin-top:1px;}
.sc-phone{font-size:12px;color:var(--t4);margin-top:1px;}
.sc-del{width:32px;height:32px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);color:var(--t3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sc-del:active{background:#3d1a1a;color:#ffaaaa;}
.admin-bar{display:flex;gap:8px;margin-bottom:14px;align-items:center;}
.admin-badge{font-size:11px;color:#e8892a;border:1px solid #e8892a;border-radius:6px;padding:3px 10px;font-weight:700;}
.admin-out-btn{font-size:12px;color:var(--t3);background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:5px 12px;cursor:pointer;}
.lock-box{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center;margin-bottom:16px;}
.lock-box p{font-size:14px;color:var(--t2);margin-bottom:12px;}
.lock-box button{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--t2);font-size:13px;padding:10px 20px;cursor:pointer;}
.pw-change-btn{font-size:12px;color:var(--t4);background:transparent;border:none;cursor:pointer;text-decoration:underline;margin-top:8px;}

/* NOTICE */
.ncompose{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px;}
.ncompose textarea{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--t1);font-size:15px;padding:12px 14px;resize:none;min-height:100px;font-family:inherit;line-height:1.6;}
.ncompose textarea::placeholder{color:var(--t4);}
.ncompose-row{display:flex;gap:8px;margin-top:10px;}
.ncompose-row input{flex:1;padding:11px 14px;border:1px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:14px;}
.ncompose-row input::placeholder{color:var(--t4);}
.npost-btn{padding:11px 18px;border-radius:10px;border:none;background:#fff;color:#000;font-size:14px;font-weight:700;cursor:pointer;flex-shrink:0;}
.npin-row{display:flex;align-items:center;gap:8px;margin-top:10px;}
.npin-row input{width:18px;height:18px;accent-color:#e8892a;cursor:pointer;}
.npin-row label{font-size:13px;color:var(--t3);}
.ncard{background:var(--bg1);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;}
.ncard-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.ncard-author{display:flex;align-items:center;gap:9px;}
.nav2{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.na-name{font-size:13px;font-weight:700;color:var(--t2);}
.na-date{font-size:11px;color:var(--t4);margin-top:1px;}
.ndel{width:28px;height:28px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);color:var(--t3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ndel:active{background:#3d1a1a;color:#ffaaaa;}
.nbody{font-size:14px;color:var(--t2);line-height:1.7;white-space:pre-wrap;word-break:break-word;}
.npin-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:#e8892a;border:1px solid #e8892a;border-radius:6px;padding:2px 8px;margin-bottom:10px;}
.nempty{text-align:center;padding:3rem 0;color:var(--t4);font-size:14px;}

/* SHEET */
.sbg{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-end;}
.sht{width:100%;background:var(--bg1);border-radius:20px 20px 0 0;padding:0 18px calc(28px + env(safe-area-inset-bottom));border-top:1px solid var(--border2);max-height:90vh;overflow-y:auto;}
.s-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 16px;}
.sht h3{font-size:17px;font-weight:700;margin-bottom:3px;}
.sht-sub{font-size:13px;color:var(--t3);margin-bottom:16px;}
.sht label{font-size:12px;color:var(--t2);font-weight:600;display:block;margin-bottom:6px;margin-top:14px;}
.sht select,.sht input{width:100%;padding:13px 14px;border:1px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--t1);font-size:15px;}
.sht input::placeholder{color:var(--t4);}
.sht-btns{display:flex;gap:10px;margin-top:20px;}
.sht-btns button{flex:1;padding:14px;border-radius:12px;font-size:15px;cursor:pointer;font-weight:700;}
.sc{background:var(--bg2);border:1px solid var(--border2);color:var(--t2);}
.sk{background:#fff;color:#000;border:none;}
/* login name list */
.name-list{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.name-btn{width:100%;padding:13px 16px;border-radius:10px;background:var(--bg2);border:1px solid var(--border2);color:var(--t1);font-size:15px;font-weight:600;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;}
.name-btn:active{background:var(--bg3);}
.name-btn .nb-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.name-btn .nb-info{display:flex;flex-direction:column;}
.name-btn .nb-role{font-size:11px;color:var(--t3);margin-top:1px;}
.saben-row{margin-top:12px;}
</style>
</head>

function genTimes(){
  const t=[];
  for(let h=6;h<=23;h++){
    t.push(pad(h)+':00');
    if(h<23)t.push(pad(h)+':30');
  }
  return t;
}
function pad(n){return String(n).padStart(2,'0');}
const TIMES=genTimes();

function ld(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function sv(k,v){localStorage.setItem(k,JSON.stringify(v));}

let trainers=ld('og5_trainers',[]);
let slots=ld('og5_slots',[]);
let notices=ld('og5_notices',[]);

  sv('og5_trainers',trainers);
}

function el(t,c){const e=document.createElement(t);if(c)e.className=c;return e;}
function pad2(n){return String(n).padStart(2,'0');}
function initials(n){return(n.match(/\S+/g)||[n]).map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function dateKey(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function isToday(d){return dateKey(d)===dateKey(new Date());}
function fmtTs(ts){const d=new Date(ts);return(d.getMonth()+1)+'/'+d.getDate()+' '+pad2(d.getHours())+':'+pad2(d.getMinutes());}

function getWeekDates(o){
  const now=new Date(),dow=now.getDay();
  const mon=new Date(now);
  mon.setDate(now.getDate()-((dow+6)%7)+o*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

function getWeekNum(monDate){
  const first=new Date(monDate.getFullYear(),monDate.getMonth(),1);
  const firstDow=(first.getDay()+6)%7;
  return Math.ceil((monDate.getDate()+firstDow)/7);
}

function fmtWeekLabel(wd){
  const mon=wd[0],sun=wd[6];
  const wn=getWeekNum(mon);
  const mm=mon.getMonth()+1,sm=sun.getMonth()+1;
  return {
    main:'[ '+mm+'월 '+wn+'주차 ]',
    sub:mm+'월 '+mon.getDate()+'일 ~ '+sm+'월 '+sun.getDate()+'일'
  };
}

// ── LOGIN UI ──
function updateLoginChip(){
  const chip=document.getElementById('login-chip');
  if(curUser){
    const tr=trainers.find(t=>t.id===curUser);
    if(tr){
      const c=COLORS[tr.color%COLORS.length];
      chip.textContent=tr.name;
      chip.style.background=c.dot;
      chip.classList.add('logged');
      return;
    }
  }
  chip.textContent='로그인';
  chip.style.background='';
  chip.classList.remove('logged');
}

function openLoginSheet(){
  if(curUser){
    if(confirm('로그아웃 하시겠습니까?')){curUser=null;sv('og5_cur_user',null);updateLoginChip();}
    return;
  }
  const sc=document.getElementById('sc');
  sc.innerHTML='';
  const bg=el('div','sbg');
  bg.onclick=e=>{if(e.target===bg)sc.innerHTML='';};
  const sht=el('div','sht');
  const h=el('div','s-handle');
  const h3=el('h3');h3.textContent='로그인';h3.style.marginBottom='4px';
  const sub=el('div','sht-sub');sub.textContent='이름을 선택하고 사번을 입력하세요';

  let selectedId=null;

  const nameList=el('div','name-list');
  trainers.forEach(tr=>{
    const c=COLORS[tr.color%COLORS.length];
    const btn=el('button','name-btn');
    btn.id='nb-'+tr.id;
    const av=el('div','nb-av');av.style.cssText='background:'+c.bg+';color:'+c.text+';';av.textContent=initials(tr.name);
    const info=el('div','nb-info');
    const nm=document.createTextNode(tr.name);
    const role=el('span','nb-role');role.textContent=tr.role;
    info.appendChild(nm);info.appendChild(role);
    btn.appendChild(av);btn.appendChild(info);
    btn.onclick=()=>{
      selectedId=tr.id;
      document.querySelectorAll('.name-btn').forEach(b=>b.style.borderColor='');
      btn.style.borderColor=c.dot;
      sabenInput.focus();
    };
    nameList.appendChild(btn);
  });

  const sabenRow=el('div','saben-row');
  const sabenLbl=el('label');sabenLbl.textContent='사번 입력';
  const sabenInput=el('input');sabenInput.placeholder='예: 0001';sabenInput.type='text';
  sabenInput.onkeydown=e=>{if(e.key==='Enter')doLogin();};
  sabenRow.appendChild(sabenLbl);sabenRow.appendChild(sabenInput);

  const btns=el('div','sht-btns');
  const cancel=el('button','sc');cancel.textContent='취소';cancel.onclick=()=>sc.innerHTML='';
  const ok=el('button','sk');ok.textContent='로그인';ok.onclick=doLogin;
  btns.appendChild(cancel);btns.appendChild(ok);

  function doLogin(){
    if(!selectedId){alert('이름을 선택해주세요.');return;}
    const tr=trainers.find(t=>t.id===selectedId);
    if(!tr){return;}
    if(sabenInput.value.trim()!==tr.saban){alert('사번이 올바르지 않습니다.');return;}
    curUser=selectedId;
    sv('og5_cur_user',curUser);
    sc.innerHTML='';
    updateLoginChip();
  }

  sht.appendChild(h);sht.appendChild(h3);sht.appendChild(sub);
  sht.appendChild(nameList);sht.appendChild(sabenRow);sht.appendChild(btns);
  bg.appendChild(sht);sc.appendChild(bg);
}

// ── TABS ──
function switchTab(t){
  ['sch','sta','not'].forEach(id=>{
    document.getElementById('page-'+id).classList.toggle('show',id===t);
    document.getElementById('ttab-'+id).classList.toggle('active',id===t);
  });
  document.getElementById('fab').style.display=t==='sch'?'flex':'none';
  if(t==='sta')renderStaff();
  if(t==='not')renderNotice();
}

// ── SCHEDULE ──
function chW(d){weekOff+=d;renderDayTabs();renderTimeList();}
function goToday(){weekOff=0;selDay=(new Date().getDay()+6)%7;renderDayTabs();renderTimeList();}

function renderDayTabs(){
  const wd=getWeekDates(weekOff);
  const {main,sub}=fmtWeekLabel(wd);
  document.getElementById('wlbl-m').textContent=main;
  document.getElementById('wlbl-s').textContent=sub;
  const tabs=document.getElementById('day-tabs');
  tabs.innerHTML='';
  wd.forEach((d,i)=>{
    const tab=el('div','dtab'+(isToday(d)?' today':'')+(i===selDay?' sel':''));
    const dw=el('div','dw');dw.textContent=DAYS[d.getDay()];
    const dd=el('div','dd');dd.textContent=d.getDate();
    tab.appendChild(dw);tab.appendChild(dd);
    tab.onclick=()=>{selDay=i;renderDayTabs();renderTimeList();};
    tabs.appendChild(tab);
  });
}

function renderTimeList(){
  const wd=getWeekDates(weekOff);
  const key=dateKey(wd[selDay]);
  const list=document.getElementById('time-list');
  list.innerHTML='';
  TIMES.forEach(time=>{
    const isH=time.endsWith(':30');
    const row=el('div','trow'+(isH?'':' hr'));
    const tc=el('div','tcol');
    const lbl=el('span','tlbl'+(isH?' h':''));lbl.textContent=time;
    tc.appendChild(lbl);
    const sc2=el('div','scol');
    slots.filter(s=>s.date===key&&s.time===time).forEach(s=>{
      const tr=trainers.find(t=>t.id===s.trainerId);
      if(!tr)return;
      const c=COLORS[tr.color%COLORS.length];
      const slot=el('div','slot');slot.style.cssText='background:'+c.bg+';color:'+c.text+';';
      const info=el('div','slot-info');
      const nm=el('div','slot-name');nm.textContent=tr.name+(s.memo?' · '+s.memo:'');
      info.appendChild(nm);
      const tb=el('span','type-badge');tb.textContent=s.type||'';
      const dx=el('button','del-x');dx.textContent='×';
      dx.onclick=()=>{if(confirm(tr.name+' '+time+' 슬롯 삭제?')){slots=slots.filter(x=>x.id!==s.id);sv('og5_slots',slots);renderTimeList();}};
      slot.appendChild(info);slot.appendChild(tb);slot.appendChild(dx);
      sc2.appendChild(slot);
    });
    const ab=el('button','add-btn');ab.textContent='+ 추가';ab.onclick=()=>openAddSheet(time);
    sc2.appendChild(ab);
    row.appendChild(tc);row.appendChild(sc2);
    list.appendChild(row);
  });
}

function openAddSheet(time){
  const wd=getWeekDates(weekOff);
  const sd=wd[selDay];
  const key=dateKey(sd);
  const dn=['일','월','화','수','목','금','토'];
  const sc=document.getElementById('sc');
  sc.innerHTML='';
  const bg=el('div','sbg');
  bg.onclick=e=>{if(e.target===bg)sc.innerHTML='';};
  const sht=el('div','sht');
  const h=el('div','s-handle');
  const h3=el('h3');h3.textContent='스케줄 추가';
  const sub2=el('div','sht-sub');sub2.textContent=dn[sd.getDay()]+'요일 '+(sd.getMonth()+1)+'월'+sd.getDate()+'일'+(time?' · '+time:'');

  const l1=el('label');l1.textContent='직원';
  const tsel=el('select');tsel.id='sh-tr';
  trainers.forEach(t=>{
    const o=document.createElement('option');o.value=t.id;o.textContent=t.name+' ('+t.role+')';
    if(curUser&&t.id===curUser)o.selected=true;
    tsel.appendChild(o);
  });

  const l2=el('label');l2.textContent='시간';
  const tsel2=el('select');tsel2.id='sh-tm';
  TIMES.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;if(t===time)o.selected=true;tsel2.appendChild(o);});

  const l3=el('label');l3.textContent='일정 유형';
  const tysel=el('select');tysel.id='sh-ty';
  TYPES.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;if(t===newType)o.selected=true;tysel.appendChild(o);});
  tysel.onchange=e=>newType=e.target.value;

  const l4=el('label');l4.textContent='메모 (선택)';
  const memo=el('input');memo.id='sh-mo';memo.placeholder='회원명 등';
  memo.onkeydown=e=>{if(e.key==='Enter')doAdd(key);};

  const btns=el('div','sht-btns');
  const cc=el('button','sc');cc.textContent='취소';cc.onclick=()=>sc.innerHTML='';
  const ok=el('button','sk');ok.textContent='추가';ok.onclick=()=>doAdd(key);
  btns.appendChild(cc);btns.appendChild(ok);

  function doAdd(key){
    const tid=document.getElementById('sh-tr').value;
    const tm=document.getElementById('sh-tm').value;
    const ty=document.getElementById('sh-ty').value;
    const mo=document.getElementById('sh-mo').value.trim();
    slots.push({id:'s'+Date.now(),trainerId:tid,date:key,time:tm,type:ty,memo:mo});
    sv('og5_slots',slots);sc.innerHTML='';renderTimeList();
  }

  sht.appendChild(h);sht.appendChild(h3);sht.appendChild(sub2);
  sht.appendChild(l1);sht.appendChild(tsel);
  sht.appendChild(l2);sht.appendChild(tsel2);
  sht.appendChild(l3);sht.appendChild(tysel);
  sht.appendChild(l4);sht.appendChild(memo);
  sht.appendChild(btns);
  bg.appendChild(sht);sc.appendChild(bg);
  setTimeout(()=>memo.focus(),200);
}

// ── STAFF ──
function renderStaff(){
  const c=document.getElementById('sta-content');
  c.innerHTML='';
  const wd=getWeekDates(weekOff);

  if(isAdmin){
    const bar=el('div','admin-bar');
    const badge=el('span','admin-badge');badge.textContent='관리자 모드';
    const out=el('button','admin-out-btn');out.textContent='나가기';out.onclick=()=>{isAdmin=false;renderStaff();};
    bar.appendChild(badge);bar.appendChild(out);
    c.appendChild(bar);

    const t1=el('div','sec');t1.textContent='직원 추가';c.appendChild(t1);
    const form=el('div','sform');

    const ni=el('input');ni.id='st-n';ni.placeholder='이름';
    const rsel=el('select');rsel.id='st-r';
    ROLES.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;rsel.appendChild(o);});
    const r2=el('div','row2');r2.appendChild(ni);r2.appendChild(rsel);

    const pi=el('input');pi.id='st-p';pi.placeholder='연락처 (예: 010-0000-0000)';pi.type='tel';
    const si=el('input');si.id='st-s';si.placeholder='사번 (로그인 번호, 예: 0001)';
    const csel=el('select');csel.id='st-c';
    COLORS.forEach((_,i)=>{const o=document.createElement('option');o.value=i;o.textContent=CNAMES[i];if(i===newColor)o.selected=true;csel.appendChild(o);});
    csel.onchange=e=>newColor=parseInt(e.target.value);

    const addBtn=el('button');addBtn.textContent='+ 등록';addBtn.onclick=addStaff;
    form.appendChild(r2);form.appendChild(pi);form.appendChild(si);form.appendChild(csel);form.appendChild(addBtn);
    c.appendChild(form);

    // pw change
    const pwBtn=el('button','pw-change-btn');pwBtn.textContent='관리자 비밀번호 변경';
    pwBtn.onclick=()=>{
      const np=prompt('새 비밀번호:');
      if(np&&np.trim()){adminPw=np.trim();localStorage.setItem('og5_admin_pw',adminPw);alert('변경되었습니다.');}
    };
    c.appendChild(pwBtn);
  } else {
    const lock=el('div','lock-box');
    const p=el('p');p.textContent='직원 설정은 관리자만 변경할 수 있습니다.';
    const btn=el('button');btn.textContent='관리자 로그인';
    btn.onclick=()=>{
      const pw=prompt('관리자 비밀번호:');
      if(pw===adminPw){isAdmin=true;renderStaff();}
      else if(pw!==null)alert('비밀번호가 올바르지 않습니다.');
    };
    lock.appendChild(p);lock.appendChild(btn);
    c.appendChild(lock);
  }

  const t2=el('div','sec');t2.textContent='등록된 직원';c.appendChild(t2);
  if(!trainers.length){const em=el('div');em.style.cssText='color:#555;font-size:13px;padding:1rem 0;';em.textContent='등록된 직원이 없습니다.';c.appendChild(em);}
  trainers.forEach(tr=>{
    const col=COLORS[tr.color%COLORS.length];
    const card=el('div','staff-card');
    const av=el('div','av');av.style.cssText='background:'+col.bg+';color:'+col.text+';';av.textContent=initials(tr.name);
    const info=el('div','sc-info');
    const nm=el('div','sc-name');nm.textContent=tr.name;
    const role=el('div','sc-role');role.textContent=tr.role+(tr.saban?' · 사번 '+tr.saban:'');
    const phone=el('div','sc-phone');phone.textContent=tr.phone||'';
    info.appendChild(nm);info.appendChild(role);if(tr.phone)info.appendChild(phone);
    card.appendChild(av);card.appendChild(info);
    if(isAdmin){
      const del=el('div','sc-del');del.textContent='×';
      del.onclick=()=>{if(confirm(tr.name+' 직원을 삭제할까요?')){trainers=trainers.filter(x=>x.id!==tr.id);sv('og5_trainers',trainers);renderStaff();}};
      card.appendChild(del);
    }
    c.appendChild(card);
  });
}

function addStaff(){
  const name=(document.getElementById('st-n').value||'').trim();
  const role=document.getElementById('st-r').value;
  const phone=(document.getElementById('st-p').value||'').trim();
  const saban=(document.getElementById('st-s').value||'').trim();
  const color=parseInt(document.getElementById('st-c').value);
  if(!name){alert('이름을 입력해주세요.');return;}
  if(!saban){alert('사번을 입력해주세요.');return;}
  if(trainers.some(t=>t.saban===saban)){alert('이미 사용 중인 사번입니다.');return;}
  trainers.push({id:'t'+Date.now(),name,role,phone,saban,color});
  sv('og5_trainers',trainers);
  renderStaff();
}

// ── NOTICE ──
function renderNotice(){
  const c=document.getElementById('not-content');
  c.innerHTML='';
  const comp=el('div','ncompose');
  const ta=el('textarea');ta.id='n-b';ta.placeholder='공지 내용을 입력하세요...';comp.appendChild(ta);
  const row=el('div','ncompose-row');
  const ai=el('input');ai.id='n-a';ai.placeholder='작성자 이름';
  if(curUser){const tr=trainers.find(t=>t.id===curUser);if(tr)ai.value=tr.name;}
  const pb=el('button','npost-btn');pb.textContent='등록';pb.onclick=postNotice;
  row.appendChild(ai);row.appendChild(pb);comp.appendChild(row);
  const pr=el('div','npin-row');
  const pc=el('input');pc.type='checkbox';pc.id='n-p';
  const pl=el('label');pl.htmlFor='n-p';pl.textContent='상단 고정';
  pr.appendChild(pc);pr.appendChild(pl);comp.appendChild(pr);
  c.appendChild(comp);
  const t1=el('div','sec');t1.textContent='공지사항';c.appendChild(t1);
  const sorted=[...notices].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||b.ts-a.ts);
  if(!sorted.length){const em=el('div','nempty');em.textContent='등록된 공지가 없습니다.';c.appendChild(em);}
  sorted.forEach(n=>{
    const card=el('div','ncard');
    if(n.pinned){const pb2=el('div','npin-badge');pb2.textContent='📌 고정';card.appendChild(pb2);}
    const hdr=el('div','ncard-hdr');
    const aw=el('div','ncard-author');
    const tr2=trainers.find(t=>t.name===n.author);
    const av2=el('div','nav2');
    if(tr2){const col=COLORS[tr2.color%COLORS.length];av2.style.cssText='background:'+col.bg+';color:'+col.text+';';av2.textContent=initials(tr2.name);}
    else{av2.style.cssText='background:#252525;color:#888;';av2.textContent=n.author?n.author[0].toUpperCase():'?';}
    const ai2=el('div');
    const an=el('div','na-name');an.textContent=n.author||'익명';
    const ad=el('div','na-date');ad.textContent=fmtTs(n.ts);
    ai2.appendChild(an);ai2.appendChild(ad);
    aw.appendChild(av2);aw.appendChild(ai2);
    const db=el('button','ndel');db.textContent='×';
    db.onclick=()=>{if(confirm('공지를 삭제할까요?')){notices=notices.filter(x=>x.id!==n.id);sv('og5_notices',notices);renderNotice();}};
    hdr.appendChild(aw);hdr.appendChild(db);
    const body=el('div','nbody');body.textContent=n.body;
    card.appendChild(hdr);card.appendChild(body);
    c.appendChild(card);
  });
}

function postNotice(){
  const body=(document.getElementById('n-b').value||'').trim();
  const author=(document.getElementById('n-a').value||'').trim();
  const pinned=document.getElementById('n-p').checked;
  if(!body)return;
  notices.unshift({id:'n'+Date.now(),body,author:author||'익명',pinned,ts:Date.now()});
  sv('og5_notices',notices);renderNotice();
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}

updateLoginChip();
renderDayTabs();
renderTimeList();
</script>
